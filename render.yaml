services:
  # Backend API Service
  - type: web
    name: gym-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URI
        sync: false
      - key: SECRET_KEY
        sync: false

  # Public Website Frontend
  - type: static
    name: gym-website
    rootDir: frontend-website
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_URL
        value: https://gym-backend.onrender.com/api

  # Admin Dashboard Frontend
  - type: static
    name: gym-admin
    rootDir: frontend-admin
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_URL
        value: https://gym-backend.onrender.com/api
